# Example Nginx rules for kdl.com.mx.
# Put these inside the server block that serves the static site.

location = /Producto.dc.html {
  if ($arg_cat != "") {
    return 301 /productos/$arg_cat/$arg_p/;
  }
}

location = /Productos.dc.html {
  if ($arg_cat != "") {
    return 301 /productos/$arg_cat/;
  }
}

location / {
  try_files $uri $uri/ =404;
}
